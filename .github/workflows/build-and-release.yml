name: Build and Upload to Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.1.1)'
        required: true
        default: 'v1.1.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload to Release
        run: |
          gh release upload ${{ inputs.version }} `
            dist/Viberadio-${{ inputs.version }}-Setup.exe `
            dist/Viberadio-${{ inputs.version }}-Setup.exe.blockmap `
            dist/latest.yml `
            --repo x123dd/Viberadio `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
